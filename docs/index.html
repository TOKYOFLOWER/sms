<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0C6B43" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0B120E" media="(prefers-color-scheme: dark)">
  <title>SMS送信侍</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📲</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Space+Grotesk:wght@500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#EDF0ED; --surface:#FFFFFF; --surface-2:#F6F8F6;
      --border:#D7DED9; --ink:#14201A; --muted:#5C6B62;
      --brand:#0C6B43; --brand-strong:#0A5837; --brand-tint:#E4F1EA;
      --gold:#9A7B33; --danger:#C2341D; --danger-tint:#F8E6E2; --focus:#1FA06A;
      --font-ui:'Noto Sans JP', system-ui, -apple-system, sans-serif;
      --font-display:'Space Grotesk','Noto Sans JP', sans-serif;
      --font-mono:'Space Mono', ui-monospace, 'SFMono-Regular', monospace;
      --r-card:12px; --r-field:9px; --r-chip:7px;
      --s1:4px; --s2:8px; --s3:12px; --s4:16px; --s5:20px; --s6:24px;
      --maxw:480px;
    }
    @media (prefers-color-scheme:dark){
      :root{
        --bg:#0B120E; --surface:#121C16; --surface-2:#16221B;
        --border:#243530; --ink:#E8EFEA; --muted:#9CB0A6;
        --brand:#2FB179; --brand-strong:#3CC489; --brand-tint:#15271E;
        --gold:#C7A35A; --danger:#F0735B; --danger-tint:#2A1714; --focus:#34B27B;
      }
    }

    *{box-sizing:border-box}
    html,body{margin:0}
    body{
      font-family:var(--font-ui); color:var(--ink); background:var(--bg);
      font-size:15px; line-height:1.5; -webkit-font-smoothing:antialiased;
      min-height:100dvh;
    }

    /* ── Topbar ────────────────────────────────────── */
    .topbar{
      position:sticky; top:0; z-index:10;
      display:flex; align-items:center; justify-content:space-between; gap:var(--s3);
      padding:var(--s3) var(--s4); background:var(--surface);
      border-bottom:1px solid var(--border);
    }
    .brandmark{font-family:var(--font-display); font-weight:700; letter-spacing:.02em; font-size:18px; white-space:nowrap; flex-shrink:0}
    .who{display:flex; align-items:center; gap:var(--s2); color:var(--muted); font-size:12px; min-width:0}
    .who-dot{width:7px;height:7px;border-radius:50%;background:var(--brand);flex:none}
    .who-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:46vw}
    .btn-ghost{
      font:inherit; font-size:12px; color:var(--muted); background:transparent;
      border:1px solid var(--border); border-radius:var(--r-chip);
      padding:6px 10px; cursor:pointer; white-space:nowrap;
    }
    .btn-ghost:hover{color:var(--ink); border-color:var(--muted)}

    /* ── Layout ────────────────────────────────────── */
    .wrap{max-width:var(--maxw); margin:0 auto; padding:var(--s4)}
    .card{
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--r-card); padding:var(--s5);
      box-shadow:0 1px 0 rgba(20,32,26,.03);
    }

    /* ── 送信元クレジット ───────────────────────────── */
    .sender{
      position:relative; display:flex; align-items:center; gap:var(--s3);
      background:var(--brand-tint); border:1px solid color-mix(in srgb,var(--brand) 22%,transparent);
      border-radius:var(--r-chip); padding:var(--s3) var(--s4) var(--s3) var(--s5);
      overflow:hidden; margin-bottom:var(--s5);
    }
    .sender::before{content:""; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--brand)}
    .sender-label{font-family:var(--font-mono); font-size:11px; letter-spacing:.12em;
      text-transform:uppercase; color:var(--brand-strong); margin-bottom:2px}
    .sender-name{font-family:var(--font-display); font-weight:700; font-size:20px; color:var(--ink); line-height:1.1}
    .sender-check{margin-left:auto; color:var(--brand); font-size:14px; flex:none}

    /* ── フィールド ────────────────────────────────── */
    .field{margin-bottom:var(--s4)}
    .eyebrow{font-family:var(--font-mono); font-size:11px; letter-spacing:.12em;
      text-transform:uppercase; color:var(--muted); margin-bottom:6px}
    .row{display:flex; gap:var(--s2)}
    .select,.input,.textarea{
      width:100%; font-family:var(--font-ui); font-size:15px; color:var(--ink);
      background:var(--surface-2); border:1px solid var(--border);
      border-radius:var(--r-field); padding:12px 14px; min-height:44px;
    }
    .select{flex:0 0 42%}
    .input{font-family:var(--font-mono); letter-spacing:.02em; flex:1}
    .textarea{min-height:128px; resize:vertical; line-height:1.6}
    .select:focus,.input:focus,.textarea:focus{
      outline:none; border-color:var(--focus);
      box-shadow:0 0 0 3px color-mix(in srgb,var(--focus) 25%,transparent);
    }
    .meter{font-family:var(--font-mono); font-size:12px; color:var(--muted);
      text-align:right; margin-top:6px}
    .meter.over{color:var(--danger)}

    /* ── ログインカード専用フィールド ──────────────── */
    .auth-card{max-width:380px; margin:14vh auto 0; padding:var(--s4)}
    .auth-card .card{padding:var(--s6)}
    .auth-card h1{font-family:var(--font-display); font-weight:700; font-size:18px; margin:0 0 var(--s2)}
    .auth-card p.sub{color:var(--muted); font-size:14px; margin:0 0 var(--s5)}
    .auth-field{margin-bottom:var(--s4)}
    .auth-field label{
      display:block; font-family:var(--font-mono); font-size:11px;
      letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin-bottom:6px;
    }
    .auth-field input{
      width:100%; font-family:var(--font-ui); font-size:15px; color:var(--ink);
      background:var(--surface-2); border:1px solid var(--border);
      border-radius:var(--r-field); padding:12px 14px; min-height:44px;
    }
    .auth-field input:focus{
      outline:none; border-color:var(--focus);
      box-shadow:0 0 0 3px color-mix(in srgb,var(--focus) 25%,transparent);
    }
    .auth-field input.otp-input{
      font-family:var(--font-mono); font-size:22px; letter-spacing:.4em;
      text-align:center;
    }

    /* ── 信頼デバイスチェック ──────────────────────── */
    .trust-row{margin:var(--s2) 0 var(--s4)}
    .trust-label{
      display:flex; align-items:center; gap:var(--s2);
      font-size:13px; color:var(--muted); cursor:pointer; user-select:none;
    }
    .trust-label input[type=checkbox]{
      width:16px; height:16px; accent-color:var(--brand); cursor:pointer; flex:none;
    }

    /* ── OTP ヒント・再送 ──────────────────────────── */
    .otp-hint{font-size:13px; color:var(--muted); margin-bottom:var(--s4); line-height:1.5}
    .otp-hint strong{color:var(--ink)}
    #resend-row{text-align:right; font-size:12px; margin-top:var(--s2)}
    #resend-btn{
      background:none; border:none; color:var(--brand); cursor:pointer;
      font:inherit; font-size:12px; text-decoration:underline; padding:0;
    }
    #resend-btn:disabled{color:var(--muted); cursor:default; text-decoration:none}

    /* ── 送信ボタン ────────────────────────────────── */
    .btn-send{
      width:100%; font:inherit; font-weight:700; font-size:16px;
      color:#fff; background:var(--brand); border:0; border-radius:var(--r-field);
      padding:15px; min-height:50px; cursor:pointer; margin-top:var(--s2);
      transition:transform .06s ease, background .15s ease;
    }
    .btn-send:hover{background:var(--brand-strong)}
    .btn-send:active{transform:scale(.985)}
    .btn-send:disabled{background:var(--border); color:var(--muted); cursor:not-allowed}

    /* ── Ping link ─────────────────────────────────── */
    #ping-link{
      display:block; text-align:right; font-size:12px;
      color:var(--muted); margin-top:var(--s3);
      cursor:pointer; text-decoration:underline;
    }
    #ping-link:hover{color:var(--ink)}

    /* ── フッター ───────────────────────────────────── */
    .foot{
      max-width:var(--maxw); margin:var(--s5) auto 0;
      padding:0 var(--s4) var(--s6);
      text-align:center; color:var(--muted); font-size:12px; line-height:1.7;
    }
    .foot .latin{font-family:var(--font-display); letter-spacing:.02em; color:var(--ink)}
    .foot .sep{opacity:.5; margin:0 6px}

    /* ── 中央メッセージ ─────────────────────────────── */
    .center-msg{text-align:center; color:var(--muted); padding:var(--s6) var(--s4); font-size:14px}

    /* ── トースト ───────────────────────────────────── */
    #toast{
      position:fixed; left:50%; bottom:24px;
      transform:translateX(-50%) translateY(120px);
      padding:12px 18px; border-radius:999px; color:#fff;
      font-size:14px; font-weight:500; background:#333;
      box-shadow:0 6px 24px rgba(0,0,0,.18); z-index:50;
      transition:transform .28s ease; pointer-events:none;
    }
    #toast.show{transform:translateX(-50%) translateY(0)}
    #toast.show.success{background:var(--brand)}
    #toast.show.error{background:var(--danger)}

    /* ── 確認モーダル ───────────────────────────────── */
    .modal-bg{
      position:fixed; inset:0; background:rgba(10,18,14,.5);
      display:flex; align-items:center; justify-content:center;
      padding:var(--s4); z-index:40;
    }
    .modal-inner{
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--r-card); padding:var(--s5);
      width:100%; max-width:360px;
    }
    .modal-inner h2{
      font-family:var(--font-display); font-weight:700; font-size:17px;
      margin:0 0 var(--s4);
    }
    .modal-field{margin-bottom:var(--s3)}
    .modal-actions{display:flex; gap:var(--s2); margin-top:var(--s5)}
    .modal-actions .btn-ghost{flex:1; padding:12px; font-size:15px; border-radius:var(--r-field)}
    .modal-actions .btn-send{flex:1; margin-top:0}

    /* ── スピナー ───────────────────────────────────── */
    #spinner-overlay{
      position:fixed; inset:0; background:rgba(255,255,255,.75);
      display:flex; align-items:center; justify-content:center; z-index:200;
    }
    @media (prefers-color-scheme:dark){
      #spinner-overlay{background:rgba(11,18,14,.8)}
    }
    .spinner{
      width:40px; height:40px;
      border:4px solid var(--border); border-top-color:var(--brand);
      border-radius:50%; animation:spin .8s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    .hidden{display:none !important}

    @media (prefers-reduced-motion:reduce){
      *{animation-duration:.001ms !important; transition-duration:.001ms !important}
    }

    /* ── 送信履歴 ───────────────────────────────────── */
    .history-item{padding:var(--s3) 0; border-bottom:1px solid var(--border)}
    .history-item:last-child{border-bottom:none}
    .history-meta{display:flex; align-items:center; gap:var(--s2); flex-wrap:wrap; margin-bottom:4px}
    .history-date{font-family:var(--font-mono); font-size:11px; color:var(--muted)}
    .history-to{font-family:var(--font-mono); font-size:12px; color:var(--ink); font-weight:500}
    .history-status{
      font-size:11px; font-weight:500; border-radius:var(--r-chip);
      padding:2px 8px; margin-left:auto; white-space:nowrap;
    }
    .history-status.ok{background:var(--brand-tint); color:var(--brand-strong)}
    .history-status.err{background:var(--danger-tint); color:var(--danger)}
    .history-msg{font-size:13px; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  </style>
</head>
<body>

<!-- ── STEP 1: ログイン画面（id + pw） ──────────────────────────── -->
<div id="step-login">
  <div class="auth-card">
    <div class="card">
      <h1>SMS送信侍</h1>
      <p class="sub">GSD会員IDでログイン</p>
      <form id="loginForm" novalidate>
        <div class="auth-field">
          <label for="login-id">会員ID</label>
          <input
            type="text"
            id="login-id"
            name="id"
            autocomplete="username"
            required
            placeholder="your-id"
          >
        </div>
        <div class="auth-field">
          <label for="login-pw">パスワード</label>
          <input
            type="password"
            id="login-pw"
            name="pw"
            autocomplete="current-password"
            required
            placeholder="••••••••"
          >
        </div>
        <button type="submit" class="btn-send" id="loginBtn">ログイン</button>
      </form>
    </div>
  </div>
</div>

<!-- ── STEP 2: OTP 画面 ──────────────────────────────────────────── -->
<div id="step-otp" class="hidden">
  <div class="auth-card">
    <div class="card">
      <h1>認証コードを入力</h1>
      <p class="otp-hint" id="otp-hint">登録メールアドレスに6桁のコードを送信しました。</p>
      <form id="otpForm" novalidate>
        <div class="auth-field">
          <label for="otp-code">認証コード</label>
          <input
            type="text"
            id="otp-code"
            name="otp"
            class="otp-input"
            autocomplete="one-time-code"
            inputmode="numeric"
            pattern="[0-9]{6}"
            maxlength="6"
            required
            placeholder="000000"
          >
        </div>
        <div class="trust-row">
          <label class="trust-label">
            <input type="checkbox" id="trustDevice">
            <span>このデバイスを30日間信頼する</span>
          </label>
        </div>
        <button type="submit" class="btn-send" id="otpBtn">認証する</button>
        <div id="resend-row">
          <button type="button" id="resend-btn" disabled>再送 (<span id="resend-timer">60</span>s)</button>
        </div>
      </form>
      <div style="margin-top:var(--s4);text-align:center">
        <button type="button" class="btn-ghost" id="back-to-login">← ログインに戻る</button>
      </div>
    </div>
  </div>
</div>

<!-- ── STEP 3: 送信画面（ログイン後） ───────────────────────────── -->
<div id="app-area" class="hidden">

  <header class="topbar">
    <span class="brandmark">SMS送信侍</span>
    <div class="who">
      <span class="who-dot"></span>
      <span class="who-name" id="user-name"></span>
      <button class="btn-ghost" id="signout-btn">ログアウト</button>
    </div>
  </header>

  <div class="wrap">

    <div id="checking-area" class="hidden">
      <p class="center-msg">確認中...</p>
    </div>

    <div id="no-permission-area" class="hidden">
      <div class="card" style="text-align:center;padding:var(--s6)">
        <p style="color:var(--danger);margin-bottom:var(--s2)">送信権限がありません</p>
        <p style="font-size:13px;color:var(--muted)">管理者に連絡してください</p>
      </div>
    </div>

    <div id="form-section" class="hidden">
      <div class="card">

        <div class="sender" id="account-badge">
          <div>
            <div class="sender-label">送信元 · SENDER</div>
            <div class="sender-name" id="account-label"></div>
          </div>
          <span class="sender-check">✓</span>
        </div>

        <form id="smsForm">
          <div class="field">
            <div class="eyebrow">宛先 · TO</div>
            <div class="row">
              <select id="countryCode" name="countryCode" class="select"></select>
              <input
                type="tel"
                id="phoneNumber"
                name="phoneNumber"
                class="input"
                placeholder="080xxxxxxxx"
                inputmode="numeric"
                required
              >
            </div>
          </div>

          <div class="field">
            <div class="eyebrow">本文 · MESSAGE</div>
            <textarea id="message" name="message" class="textarea" rows="5" required></textarea>
            <div class="meter" id="charCount">0 / 660 (0 SMS)</div>
          </div>

          <button type="submit" id="sendBtn" class="btn-send" disabled>送信する</button>
        </form>

        <span id="ping-link">疎通確認 (ping)</span>
      </div>
    </div>

    <div id="history-section" class="hidden" style="margin-top:var(--s4)">
      <div class="card">
        <div class="eyebrow" style="margin-bottom:var(--s4)">送信履歴 · HISTORY</div>
        <div id="history-loading" class="center-msg hidden">読み込み中...</div>
        <div id="history-error" class="hidden" style="color:var(--danger);font-size:14px;padding:var(--s2) 0"></div>
        <div id="history-empty" class="center-msg hidden">まだ送信履歴はありません</div>
        <div id="history-list"></div>
      </div>
    </div>

  </div>

  <footer class="foot">
    A GSD tool<span class="sep">·</span>powered by <span class="latin">Ginza TOKYOFLOWER</span>
  </footer>

</div>

<!-- ── 送信確認モーダル ──────────────────────────────────────────── -->
<div id="modal" class="modal-bg hidden">
  <div class="modal-inner">
    <h2>送信確認</h2>
    <div class="modal-field">
      <div class="eyebrow">送信元</div>
      <span id="modal-account"></span>
    </div>
    <div class="modal-field">
      <div class="eyebrow">宛先</div>
      <span id="modal-to" style="font-family:var(--font-mono)"></span>
    </div>
    <div class="modal-field">
      <div class="eyebrow">メッセージ</div>
      <div id="modal-text" style="background:var(--surface-2);border-radius:var(--r-chip);padding:var(--s3);font-size:14px;white-space:pre-wrap;word-break:break-all;max-height:180px;overflow-y:auto;margin-top:4px"></div>
    </div>
    <div class="modal-field">
      <div class="eyebrow">送信数</div>
      <span id="modal-segments" style="font-family:var(--font-mono)"></span>
    </div>
    <div class="modal-actions">
      <button id="cancelBtn" class="btn-ghost">キャンセル</button>
      <button id="confirmBtn" class="btn-send">送信する</button>
    </div>
  </div>
</div>

<!-- ── スピナー ──────────────────────────────────────────────────── -->
<div id="spinner-overlay" class="hidden">
  <div class="spinner"></div>
</div>

<!-- ── トースト通知 ──────────────────────────────────────────────── -->
<div id="toast"></div>

<!-- ── スクリプト ────────────────────────────────────────────────── -->
<script src="./country-codes.js"></script>
<script>
const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbxRCrEUgkVl0vPPB-SIbQJXcezxswj81xi1d9ak0OPE9CYHuIUs1l0IpYIZycjYXjd3/exec';
const SMS_RULES  = { SEGMENT: 70, MAX: 660 };

// ── アプリ状態（メモリのみ。XSS対策：localStorage に書かない） ──
let token      = null;  // セッショントークン
let pendingId  = null;  // ログイン中のID（OTP待ち）
let userLabel  = null;  // sms_accounts.label
let resendTimer = null;

// ── 起動 ─────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  populateCountrySelect();
  setupEventListeners();
  updateCharCount();
  showStep('login');
});

// ── 国番号セレクト初期化 ─────────────────────────────────────────
function populateCountrySelect() {
  const sel = document.getElementById('countryCode');
  (window.COUNTRY_CODES || []).forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.value;
    opt.textContent = c.label;
    if (c.defaultSelected) opt.selected = true;
    sel.appendChild(opt);
  });
}

// ── イベントリスナー ─────────────────────────────────────────────
function setupEventListeners() {
  document.getElementById('loginForm').addEventListener('submit', handleLogin);
  document.getElementById('otpForm').addEventListener('submit', handleOtp);
  document.getElementById('back-to-login').addEventListener('click', () => {
    clearResendTimer();
    showStep('login');
  });
  document.getElementById('resend-btn').addEventListener('click', handleResend);
  document.getElementById('signout-btn').addEventListener('click', signOut);
  document.getElementById('smsForm').addEventListener('submit', handleFormSubmit);
  document.getElementById('message').addEventListener('input', updateCharCount);
  document.getElementById('cancelBtn').addEventListener('click', () => {
    document.getElementById('modal').classList.add('hidden');
  });
  document.getElementById('confirmBtn').addEventListener('click', handleConfirm);
  document.getElementById('ping-link').addEventListener('click', pingTest);
}

// ── 画面ステップ切り替え ─────────────────────────────────────────
function showStep(step) {
  document.getElementById('step-login').classList.toggle('hidden', step !== 'login');
  document.getElementById('step-otp').classList.toggle('hidden',   step !== 'otp');
  document.getElementById('app-area').classList.toggle('hidden',   step !== 'app');
}

// ── ログイン共通後処理 ────────────────────────────────────────────
function onLoginSuccess(tok, lab) {
  token     = tok;
  userLabel = lab;
  clearResendTimer();
  renderApp();
  showStep('app');
}

// ── STEP 1: ログイン（id + pw → login API） ──────────────────────
async function handleLogin(e) {
  e.preventDefault();
  const id = document.getElementById('login-id').value.trim();
  const pw = document.getElementById('login-pw').value;
  if (!id || !pw) { showToast('IDとパスワードを入力してください', 'error'); return; }

  showSpinner(true);
  try {
    const data = await callApi('login', { id, pw });
    showSpinner(false);
    if (!data.ok) { showToast(data.error || 'ログインできませんでした', 'error'); return; }

    pendingId = id;

    // otp_required=FALSE → 即ログイン成功
    if (data.result.stage === 'token_issued') {
      onLoginSuccess(data.result.token, data.result.label);
      return;
    }

    // otp_required=TRUE → 信頼デバイスを先にチェック
    const savedTrustedToken = localStorage.getItem('sms_trusted_' + id);
    if (savedTrustedToken) {
      showSpinner(true);
      try {
        const td = await callApi('verifyTrustedDevice', { id, trusted_token: savedTrustedToken });
        showSpinner(false);
        if (td.ok) {
          onLoginSuccess(td.result.token, td.result.label);
          return;
        }
      } catch (_) { showSpinner(false); }
      // 失敗（期限切れ等）→ 削除して OTP 画面へ
      localStorage.removeItem('sms_trusted_' + id);
    }

    // OTP 画面へ
    const hint = data.result.email_hint || '';
    document.getElementById('otp-hint').innerHTML =
      hint
        ? `登録メール（<strong>${escHtml(hint)}</strong>）に6桁のコードを送信しました。`
        : '登録メールアドレスに6桁のコードを送信しました。';
    document.getElementById('otp-code').value = '';
    document.getElementById('trustDevice').checked = false;
    showStep('otp');
    startResendTimer();
  } catch (err) {
    showSpinner(false);
    showToast('通信エラー: ' + err.message, 'error');
  }
}

// ── STEP 2: OTP 照合（verifyOtp API） ───────────────────────────
async function handleOtp(e) {
  e.preventDefault();
  const otp = document.getElementById('otp-code').value.trim();
  if (!/^\d{6}$/.test(otp)) { showToast('6桁の数字を入力してください', 'error'); return; }

  showSpinner(true);
  try {
    const data = await callApi('verifyOtp', { id: pendingId, otp });
    showSpinner(false);
    if (data.ok) {
      const newToken = data.result.token;
      const newLabel = data.result.label;

      // 「信頼する」チェック ON → デバイス登録（失敗しても続行）
      if (document.getElementById('trustDevice').checked) {
        try {
          token = newToken; // callApi がトークンを付与できるよう一時セット
          const td = await callApi('registerTrustedDevice', { user_agent: navigator.userAgent });
          if (td.ok && td.result && td.result.trusted_token) {
            localStorage.setItem('sms_trusted_' + pendingId, td.result.trusted_token);
          }
        } catch (_) {}
        token = null; // onLoginSuccess で正式にセットし直す
      }

      clearResendTimer();
      onLoginSuccess(newToken, newLabel);
    } else {
      showToast(data.error || '認証できませんでした', 'error');
    }
  } catch (err) {
    showSpinner(false);
    showToast('通信エラー: ' + err.message, 'error');
  }
}

// ── OTP 再送 ─────────────────────────────────────────────────────
async function handleResend() {
  if (!pendingId) return;
  const pw = document.getElementById('login-pw').value;
  showSpinner(true);
  try {
    const data = await callApi('login', { id: pendingId, pw });
    showSpinner(false);
    if (data.ok) {
      showToast('コードを再送しました', 'success');
      startResendTimer();
    } else {
      showToast(data.error || '再送できませんでした', 'error');
    }
  } catch (err) {
    showSpinner(false);
    showToast('通信エラー: ' + err.message, 'error');
  }
}

function startResendTimer() {
  clearResendTimer();
  let sec = 60;
  const btn = document.getElementById('resend-btn');
  const timerEl = document.getElementById('resend-timer');
  btn.disabled = true;
  timerEl.textContent = sec;
  resendTimer = setInterval(() => {
    sec--;
    timerEl.textContent = sec;
    if (sec <= 0) {
      clearResendTimer();
      btn.disabled = false;
      btn.textContent = 'コードを再送';
    }
  }, 1000);
}

function clearResendTimer() {
  if (resendTimer) { clearInterval(resendTimer); resendTimer = null; }
}

// ── STEP 3: アプリ画面レンダリング ──────────────────────────────
function renderApp() {
  document.getElementById('user-name').textContent = pendingId || '';
  document.getElementById('checking-area').classList.add('hidden');
  document.getElementById('no-permission-area').classList.add('hidden');
  document.getElementById('form-section').classList.remove('hidden');
  document.getElementById('account-label').textContent = userLabel || '';
  loadHistory();
}

function signOut() {
  token     = null;
  pendingId = null;
  userLabel = null;
  document.getElementById('login-id').value = '';
  document.getElementById('login-pw').value = '';
  document.getElementById('history-section').classList.add('hidden');
  showStep('login');
}

// ── 送信履歴取得・表示 ────────────────────────────────────────────
async function loadHistory() {
  const section = document.getElementById('history-section');
  const loading = document.getElementById('history-loading');
  const error   = document.getElementById('history-error');
  const empty   = document.getElementById('history-empty');
  const list    = document.getElementById('history-list');

  section.classList.remove('hidden');
  loading.classList.remove('hidden');
  error.classList.add('hidden');
  empty.classList.add('hidden');
  list.innerHTML = '';

  try {
    const data = await callApi('listHistory', {});
    loading.classList.add('hidden');
    if (!data.ok) {
      error.textContent = 'エラー: ' + (data.error || '履歴を取得できませんでした');
      error.classList.remove('hidden');
      return;
    }
    const history = (data.result && data.result.history) || [];
    if (history.length === 0) {
      empty.classList.remove('hidden');
      return;
    }
    list.innerHTML = history.map(h => {
      const dt  = h.dt ? new Date(h.dt).toLocaleString('ja-JP', {
        year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit'
      }) : '';
      const preview = h.msg && h.msg.length > 80 ? h.msg.substring(0, 80) + '…' : (h.msg || '');
      const stClass = (h.st || '').includes('成功') ? 'ok' : 'err';
      return `<div class="history-item">
        <div class="history-meta">
          <span class="history-date">${escHtml(dt)}</span>
          <span class="history-to">${escHtml(h.to || '')}</span>
          <span class="history-status ${stClass}">${escHtml(h.st || '')}</span>
        </div>
        <div class="history-msg">${escHtml(preview)}</div>
      </div>`;
    }).join('');
  } catch (err) {
    loading.classList.add('hidden');
    error.textContent = '通信エラー: ' + err.message;
    error.classList.remove('hidden');
  }
}

// ── 文字数カウント ────────────────────────────────────────────────
function updateCharCount() {
  const len  = document.getElementById('message').value.length;
  const segs = len === 0 ? 0 : Math.ceil(len / SMS_RULES.SEGMENT);
  const over = len > SMS_RULES.MAX;
  const el   = document.getElementById('charCount');
  el.textContent = `${len} / ${SMS_RULES.MAX} (${segs} SMS)`;
  el.classList.toggle('over', over);
  document.getElementById('sendBtn').disabled = over || len === 0;
}

// ── フォーム送信 → 確認モーダル ──────────────────────────────────
function handleFormSubmit(e) {
  e.preventDefault();
  const cc   = document.getElementById('countryCode').value;
  let phone  = document.getElementById('phoneNumber').value.trim();
  if (phone.startsWith('0')) phone = phone.slice(1);
  const to   = cc + phone;
  const text = document.getElementById('message').value;
  const segs = Math.ceil(text.length / SMS_RULES.SEGMENT);

  document.getElementById('modal-account').textContent  = userLabel;
  document.getElementById('modal-to').textContent       = '+' + to;
  document.getElementById('modal-text').textContent     = text;
  document.getElementById('modal-segments').textContent = `${segs} SMS`;
  document.getElementById('modal').classList.remove('hidden');
}

// ── 確認後の実送信 ────────────────────────────────────────────────
async function handleConfirm() {
  document.getElementById('modal').classList.add('hidden');
  const cc   = document.getElementById('countryCode').value;
  let phone  = document.getElementById('phoneNumber').value.trim();
  if (phone.startsWith('0')) phone = phone.slice(1);
  const to   = cc + phone;
  const text = document.getElementById('message').value;

  showSpinner(true);
  try {
    const data = await callApi('sendSms', { to, text });
    showSpinner(false);
    if (data.ok) {
      document.getElementById('message').value = '';
      updateCharCount();
      showToast('送信しました (' + data.result.segments + ' SMS)', 'success');
    } else {
      if (/有効期限|再ログイン/.test(data.error || '')) {
        showToast(data.error, 'error');
        setTimeout(() => signOut(), 2000);
      } else {
        showToast(data.error || '送信できませんでした', 'error');
      }
    }
  } catch (err) {
    showSpinner(false);
    showToast('通信エラー: ' + err.message, 'error');
  }
}

// ── ping テスト（実SMS送らない） ──────────────────────────────────
async function pingTest() {
  showSpinner(true);
  try {
    const data = await callApi('ping', {});
    showSpinner(false);
    if (data.ok) {
      showToast(`ping OK: ${data.result.id || '?'} (${data.result.label || '?'})`, 'success');
    } else {
      showToast('ping エラー: ' + data.error, 'error');
    }
  } catch (err) {
    showSpinner(false);
    showToast('ping 失敗: ' + err.message, 'error');
  }
}

// ── GAS Web App API 呼び出し ──────────────────────────────────────
async function callApi(action, payload) {
  const body = { action, ...payload };
  // login/verifyOtp/verifyTrustedDevice 以外はトークンを付与
  const noTokenActions = ['login', 'verifyOtp', 'verifyTrustedDevice'];
  if (token && !noTokenActions.includes(action)) body.token = token;
  const res = await fetch(WEBAPP_URL, {
    method:  'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body:    JSON.stringify(body)
  });
  return res.json();
}

// ── UI ヘルパー ───────────────────────────────────────────────────
function showSpinner(visible) {
  document.getElementById('spinner-overlay').classList.toggle('hidden', !visible);
}

let _toastTimer;
function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (type ? ' ' + type : '');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { el.className = ''; }, 4000);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
