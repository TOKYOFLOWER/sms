<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0C6B43" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0B120E" media="(prefers-color-scheme: dark)">
  <title>SMS送信侍</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Space+Grotesk:wght@500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#EDF0ED; --surface:#FFFFFF; --surface-2:#F6F8F6;
      --border:#D7DED9; --ink:#14201A; --muted:#5C6B62;
      --brand:#0C6B43; --brand-strong:#0A5837; --brand-tint:#E4F1EA;
      --gold:#9A7B33; --danger:#C2341D; --danger-tint:#F8E6E2; --focus:#1FA06A;
      --font-ui:'Noto Sans JP', system-ui, -apple-system, sans-serif;
      --font-display:'Space Grotesk','Noto Sans JP', sans-serif;
      --font-mono:'Space Mono', ui-monospace, 'SFMono-Regular', monospace;
      --r-card:12px; --r-field:9px; --r-chip:7px;
      --s1:4px; --s2:8px; --s3:12px; --s4:16px; --s5:20px; --s6:24px;
      --maxw:480px;
    }
    @media (prefers-color-scheme:dark){
      :root{
        --bg:#0B120E; --surface:#121C16; --surface-2:#16221B;
        --border:#243530; --ink:#E8EFEA; --muted:#9CB0A6;
        --brand:#2FB179; --brand-strong:#3CC489; --brand-tint:#15271E;
        --gold:#C7A35A; --danger:#F0735B; --danger-tint:#2A1714; --focus:#34B27B;
      }
    }

    *{box-sizing:border-box}
    html,body{margin:0}
    body{
      font-family:var(--font-ui); color:var(--ink); background:var(--bg);
      font-size:15px; line-height:1.5; -webkit-font-smoothing:antialiased;
      min-height:100dvh;
    }

    /* ── Topbar ────────────────────────────────────── */
    .topbar{
      position:sticky; top:0; z-index:10;
      display:flex; align-items:center; justify-content:space-between; gap:var(--s3);
      padding:var(--s3) var(--s4); background:var(--surface);
      border-bottom:1px solid var(--border);
    }
    .brandmark{font-family:var(--font-display); font-weight:700; letter-spacing:.02em; font-size:18px; white-space:nowrap; flex-shrink:0}
    .who{display:flex; align-items:center; gap:var(--s2); color:var(--muted); font-size:12px; min-width:0}
    .who-dot{width:7px;height:7px;border-radius:50%;background:var(--brand);flex:none}
    .who-mail{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:46vw}
    .btn-ghost{
      font:inherit; font-size:12px; color:var(--muted); background:transparent;
      border:1px solid var(--border); border-radius:var(--r-chip);
      padding:6px 10px; cursor:pointer; white-space:nowrap;
    }
    .btn-ghost:hover{color:var(--ink); border-color:var(--muted)}

    /* ── Layout ────────────────────────────────────── */
    .wrap{max-width:var(--maxw); margin:0 auto; padding:var(--s4)}
    .card{
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--r-card); padding:var(--s5);
      box-shadow:0 1px 0 rgba(20,32,26,.03);
    }

    /* ── 送信元クレジット ───────────────────────────── */
    .sender{
      position:relative; display:flex; align-items:center; gap:var(--s3);
      background:var(--brand-tint); border:1px solid color-mix(in srgb,var(--brand) 22%,transparent);
      border-radius:var(--r-chip); padding:var(--s3) var(--s4) var(--s3) var(--s5);
      overflow:hidden; margin-bottom:var(--s5);
    }
    .sender::before{content:""; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--brand)}
    .sender-label{font-family:var(--font-mono); font-size:11px; letter-spacing:.12em;
      text-transform:uppercase; color:var(--brand-strong); margin-bottom:2px}
    .sender-name{font-family:var(--font-display); font-weight:700; font-size:20px; color:var(--ink); line-height:1.1}
    .sender-check{margin-left:auto; color:var(--brand); font-size:14px; flex:none}

    /* ── フィールド ────────────────────────────────── */
    .field{margin-bottom:var(--s4)}
    .eyebrow{font-family:var(--font-mono); font-size:11px; letter-spacing:.12em;
      text-transform:uppercase; color:var(--muted); margin-bottom:6px}
    .row{display:flex; gap:var(--s2)}
    .select,.input,.textarea{
      width:100%; font-family:var(--font-ui); font-size:15px; color:var(--ink);
      background:var(--surface-2); border:1px solid var(--border);
      border-radius:var(--r-field); padding:12px 14px; min-height:44px;
    }
    .select{flex:0 0 42%}
    .input{font-family:var(--font-mono); letter-spacing:.02em; flex:1}
    .textarea{min-height:128px; resize:vertical; line-height:1.6}
    .select:focus,.input:focus,.textarea:focus{
      outline:none; border-color:var(--focus);
      box-shadow:0 0 0 3px color-mix(in srgb,var(--focus) 25%,transparent);
    }
    .meter{font-family:var(--font-mono); font-size:12px; color:var(--muted);
      text-align:right; margin-top:6px}
    .meter.over{color:var(--danger)}

    /* ── 送信ボタン ────────────────────────────────── */
    .btn-send{
      width:100%; font:inherit; font-weight:700; font-size:16px;
      color:#fff; background:var(--brand); border:0; border-radius:var(--r-field);
      padding:15px; min-height:50px; cursor:pointer; margin-top:var(--s2);
      transition:transform .06s ease, background .15s ease;
    }
    .btn-send:hover{background:var(--brand-strong)}
    .btn-send:active{transform:scale(.985)}
    .btn-send:disabled{background:var(--border); color:var(--muted); cursor:not-allowed}

    /* ── Ping link ─────────────────────────────────── */
    #ping-link{
      display:block; text-align:right; font-size:12px;
      color:var(--muted); margin-top:var(--s3);
      cursor:pointer; text-decoration:underline;
    }
    #ping-link:hover{color:var(--ink)}

    /* ── フッター ───────────────────────────────────── */
    .foot{
      max-width:var(--maxw); margin:var(--s5) auto 0;
      padding:0 var(--s4) var(--s6);
      text-align:center; color:var(--muted); font-size:12px; line-height:1.7;
    }
    .foot .latin{font-family:var(--font-display); letter-spacing:.02em; color:var(--ink)}
    .foot .sep{opacity:.5; margin:0 6px}

    /* ── サインイン画面 ────────────────────────────── */
    .signin{max-width:380px; margin:14vh auto 0; padding:var(--s4); text-align:center}
    .signin .card{padding:var(--s6)}
    .signin h1{font-family:var(--font-display); font-weight:700; font-size:18px; margin:0 0 var(--s3)}
    .signin p{color:var(--muted); font-size:14px; margin:0 0 var(--s5)}

    /* ── 中央メッセージ ─────────────────────────────── */
    .center-msg{text-align:center; color:var(--muted); padding:var(--s6) var(--s4); font-size:14px}

    /* ── トースト ───────────────────────────────────── */
    #toast{
      position:fixed; left:50%; bottom:24px;
      transform:translateX(-50%) translateY(120px);
      padding:12px 18px; border-radius:999px; color:#fff;
      font-size:14px; font-weight:500; background:#333;
      box-shadow:0 6px 24px rgba(0,0,0,.18); z-index:50;
      transition:transform .28s ease; pointer-events:none;
    }
    #toast.show{transform:translateX(-50%) translateY(0)}
    #toast.show.success{background:var(--brand)}
    #toast.show.error{background:var(--danger)}

    /* ── 確認モーダル ───────────────────────────────── */
    .modal-bg{
      position:fixed; inset:0; background:rgba(10,18,14,.5);
      display:flex; align-items:center; justify-content:center;
      padding:var(--s4); z-index:40;
    }
    .modal-inner{
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--r-card); padding:var(--s5);
      width:100%; max-width:360px;
    }
    .modal-inner h2{
      font-family:var(--font-display); font-weight:700; font-size:17px;
      margin:0 0 var(--s4);
    }
    .modal-field{margin-bottom:var(--s3)}
    .modal-actions{display:flex; gap:var(--s2); margin-top:var(--s5)}
    .modal-actions .btn-ghost{flex:1; padding:12px; font-size:15px; border-radius:var(--r-field)}
    .modal-actions .btn-send{flex:1; margin-top:0}

    /* ── スピナー ───────────────────────────────────── */
    #spinner-overlay{
      position:fixed; inset:0; background:rgba(255,255,255,.75);
      display:flex; align-items:center; justify-content:center; z-index:200;
    }
    @media (prefers-color-scheme:dark){
      #spinner-overlay{background:rgba(11,18,14,.8)}
    }
    .spinner{
      width:40px; height:40px;
      border:4px solid var(--border); border-top-color:var(--brand);
      border-radius:50%; animation:spin .8s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    .hidden{display:none !important}

    @media (prefers-reduced-motion:reduce){
      *{animation-duration:.001ms !important; transition-duration:.001ms !important}
    }
  </style>
</head>
<body>

<!-- ── サインイン画面 ─────────────────────────────────────────── -->
<div id="signin-area">
  <div class="signin">
    <div class="card">
      <h1>SMS送信侍</h1>
      <p>Googleアカウントでログイン</p>
      <div id="signin-btn"></div>
    </div>
  </div>
</div>

<!-- ── アプリ画面（ログイン後） ─────────────────────────────── -->
<div id="app-area" class="hidden">

  <!-- Sticky topbar -->
  <header class="topbar">
    <span class="brandmark">SMS送信侍</span>
    <div class="who">
      <span class="who-dot"></span>
      <span class="who-mail" id="user-email"></span>
      <button class="btn-ghost" id="signout-btn">ログアウト</button>
    </div>
  </header>

  <div class="wrap">

    <!-- アカウント確認中 -->
    <div id="checking-area" class="hidden">
      <p class="center-msg">アカウント確認中...</p>
    </div>

    <!-- 権限なし -->
    <div id="no-permission-area" class="hidden">
      <div class="card" style="text-align:center;padding:var(--s6)">
        <p style="color:var(--danger);margin-bottom:var(--s2)">このアカウントには送信権限がありません</p>
        <p style="font-size:13px;color:var(--muted)">管理者に連絡してください</p>
      </div>
    </div>

    <!-- フォーム（アカウント確定後） -->
    <div id="form-section" class="hidden">
      <div class="card">

        <!-- 送信元クレジット -->
        <div class="sender" id="account-badge">
          <div>
            <div class="sender-label">送信元 · SENDER</div>
            <div class="sender-name" id="account-label"></div>
          </div>
          <span class="sender-check">✓</span>
        </div>

        <form id="smsForm">

          <!-- 宛先 -->
          <div class="field">
            <div class="eyebrow">宛先 · TO</div>
            <div class="row">
              <select id="countryCode" name="countryCode" class="select"></select>
              <input
                type="tel"
                id="phoneNumber"
                name="phoneNumber"
                class="input"
                placeholder="080xxxxxxxx"
                inputmode="numeric"
                required
              >
            </div>
          </div>

          <!-- 本文 -->
          <div class="field">
            <div class="eyebrow">本文 · MESSAGE</div>
            <textarea id="message" name="message" class="textarea" rows="5" required></textarea>
            <div class="meter" id="charCount">0 / 660 (0 SMS)</div>
          </div>

          <button type="submit" id="sendBtn" class="btn-send" disabled>送信する</button>
        </form>

        <span id="ping-link">疎通確認 (ping)</span>
      </div>
    </div>

  </div>

  <!-- フッター -->
  <footer class="foot">
    A GSD tool<span class="sep">·</span>powered by <span class="latin">Ginza TOKYOFLOWER</span>
  </footer>

</div>

<!-- ── 送信確認モーダル ─────────────────────────────────────── -->
<div id="modal" class="modal-bg hidden">
  <div class="modal-inner">
    <h2>送信確認</h2>
    <div class="modal-field">
      <div class="eyebrow">送信元</div>
      <span id="modal-account"></span>
    </div>
    <div class="modal-field">
      <div class="eyebrow">宛先</div>
      <span id="modal-to" style="font-family:var(--font-mono)"></span>
    </div>
    <div class="modal-field">
      <div class="eyebrow">メッセージ</div>
      <div id="modal-text" style="background:var(--surface-2);border-radius:var(--r-chip);padding:var(--s3);font-size:14px;white-space:pre-wrap;word-break:break-all;max-height:180px;overflow-y:auto;margin-top:4px"></div>
    </div>
    <div class="modal-field">
      <div class="eyebrow">送信数</div>
      <span id="modal-segments" style="font-family:var(--font-mono)"></span>
    </div>
    <div class="modal-actions">
      <button id="cancelBtn" class="btn-ghost">キャンセル</button>
      <button id="confirmBtn" class="btn-send">送信する</button>
    </div>
  </div>
</div>

<!-- ── スピナー ──────────────────────────────────────────────── -->
<div id="spinner-overlay" class="hidden">
  <div class="spinner"></div>
</div>

<!-- ── トースト通知 ──────────────────────────────────────────── -->
<div id="toast"></div>

<!-- ── スクリプト ────────────────────────────────────────────── -->
<script src="./country-codes.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
// ── 設定 ─────────────────────────────────────────────────────────────
const CLIENT_ID  = '207643613287-2cpjgpupqu3tovgo60em3vor52rnvjme.apps.googleusercontent.com';
const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbxRCrEUgkVl0vPPB-SIbQJXcezxswj81xi1d9ak0OPE9CYHuIUs1l0IpYIZycjYXjd3/exec';

// SMS セグメントルール（api.js の SMS_RULES と必ず一致させること）
// Rakuten CPaaS unicode モード: 1セグメント70文字、上限660文字
const SMS_RULES = { SEGMENT: 70, MAX: 660 };

// ── アプリ状態（メモリのみ保持。localStorage/sessionStorage には書かない） ──
let idToken     = null;  // XSS 対策: メモリのみ。リロードで再ログイン。
let userEmail   = null;
let userAccount = null;  // サーバの ping レスポンスから取得。クライアントでは設定しない。
let userLabel   = null;  // 表示用ラベル（例: "銀座東京フラワー"）

// ── 起動 ─────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  populateCountrySelect();
  setupEventListeners();
  updateCharCount();
  renderApp();
  initGsi();
});

// ── 国番号セレクト初期化 ─────────────────────────────────────────────
function populateCountrySelect() {
  const sel = document.getElementById('countryCode');
  (window.COUNTRY_CODES || []).forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.value;
    opt.textContent = c.label;
    if (c.defaultSelected) opt.selected = true;
    sel.appendChild(opt);
  });
}

// ── イベントリスナー ─────────────────────────────────────────────────
function setupEventListeners() {
  document.getElementById('signout-btn').addEventListener('click', signOut);
  document.getElementById('smsForm').addEventListener('submit', handleFormSubmit);
  document.getElementById('message').addEventListener('input', updateCharCount);
  document.getElementById('cancelBtn').addEventListener('click', () => {
    document.getElementById('modal').classList.add('hidden');
  });
  document.getElementById('confirmBtn').addEventListener('click', handleConfirm);
  document.getElementById('ping-link').addEventListener('click', pingTest);
}

// ── Google Identity Services ─────────────────────────────────────────
function initGsi() {
  if (typeof google === 'undefined' || !google.accounts) {
    setTimeout(initGsi, 100);
    return;
  }
  google.accounts.id.initialize({
    client_id:   CLIENT_ID,
    callback:    handleCredential,
    auto_select: false
  });
  google.accounts.id.renderButton(
    document.getElementById('signin-btn'),
    { theme: 'outline', size: 'large', locale: 'ja', width: 280 }
  );
}

function handleCredential(response) {
  idToken     = response.credential;  // メモリのみ保持
  userEmail   = parseJwtPayload(idToken).email || '';
  userAccount = null;
  userLabel   = null;
  renderApp();          // 「確認中」状態を表示
  pingForAccount();     // サーバにアカウントを問い合わせ
}

function signOut() {
  idToken     = null;
  userEmail   = null;
  userAccount = null;
  userLabel   = null;
  if (typeof google !== 'undefined' && google.accounts) {
    google.accounts.id.disableAutoSelect();
  }
  renderApp();
}

function parseJwtPayload(token) {
  try {
    const b64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
    return JSON.parse(atob(b64));
  } catch { return {}; }
}

// ── ログイン直後にサーバへアカウントを問い合わせる ─────────────────
async function pingForAccount() {
  try {
    const data = await callApi('ping', {});
    if (data.ok) {
      userAccount = data.result.account;
      userLabel   = data.result.label;
    } else {
      userAccount = null;  // 権限なし
      userLabel   = null;
    }
  } catch {
    userAccount = null;
    userLabel   = null;
  }
  renderApp();
}

// ── UI レンダリング ───────────────────────────────────────────────────
function renderApp() {
  const loggedIn = !!idToken;
  document.getElementById('signin-area').classList.toggle('hidden', loggedIn);
  document.getElementById('app-area').classList.toggle('hidden', !loggedIn);

  if (!loggedIn) return;

  document.getElementById('user-email').textContent = userEmail;

  const isPending    = loggedIn && userAccount === null && userLabel === null;
  const hasAccount   = !!userAccount;
  const noPermission = loggedIn && !isPending && !hasAccount;

  document.getElementById('checking-area').classList.toggle('hidden', !isPending);
  document.getElementById('no-permission-area').classList.toggle('hidden', !noPermission);
  document.getElementById('form-section').classList.toggle('hidden', !hasAccount);

  if (hasAccount) {
    document.getElementById('account-label').textContent = userLabel;
  }
}

// ── 文字数カウント ────────────────────────────────────────────────────
// フロントはあくまで表示用。権威はサーバ側（api.js の SMS_RULES）。
function updateCharCount() {
  const len  = document.getElementById('message').value.length;
  const segs = len === 0 ? 0 : Math.ceil(len / SMS_RULES.SEGMENT);
  const over = len > SMS_RULES.MAX;
  const el   = document.getElementById('charCount');
  el.textContent = `${len} / ${SMS_RULES.MAX} (${segs} SMS)`;
  el.classList.toggle('over', over);
  document.getElementById('sendBtn').disabled = over || len === 0;
}

// ── フォーム送信 → 確認モーダル ──────────────────────────────────────
function handleFormSubmit(e) {
  e.preventDefault();

  const cc   = document.getElementById('countryCode').value;
  let phone  = document.getElementById('phoneNumber').value.trim();
  if (phone.startsWith('0')) phone = phone.slice(1);
  const to   = cc + phone;
  const text = document.getElementById('message').value;
  const segs = Math.ceil(text.length / SMS_RULES.SEGMENT);

  document.getElementById('modal-account').textContent  = userLabel;
  document.getElementById('modal-to').textContent       = '+' + to;
  document.getElementById('modal-text').textContent     = text;
  document.getElementById('modal-segments').textContent = `${segs} SMS`;
  document.getElementById('modal').classList.remove('hidden');
}

// ── 確認後の実送信 ────────────────────────────────────────────────────
async function handleConfirm() {
  document.getElementById('modal').classList.add('hidden');

  const cc   = document.getElementById('countryCode').value;
  let phone  = document.getElementById('phoneNumber').value.trim();
  if (phone.startsWith('0')) phone = phone.slice(1);
  const to   = cc + phone;
  const text = document.getElementById('message').value;

  showSpinner(true);
  try {
    // account はペイロードに含めない。サーバがログインメールから自動決定する。
    const data = await callApi('sendSms', { to, text });
    showSpinner(false);
    if (data.ok) {
      document.getElementById('message').value = '';
      updateCharCount();
      showToast('送信しました (' + data.result.segments + ' SMS)', 'success');
    } else {
      showToast('エラー: ' + data.error, 'error');
    }
  } catch (err) {
    showSpinner(false);
    showToast('通信エラー: ' + err.message, 'error');
  }
}

// ── ping テスト（疎通確認。実 SMS は送らない） ────────────────────────
async function pingTest() {
  if (!idToken) { showToast('ログインしてください', 'error'); return; }
  showSpinner(true);
  try {
    const data = await callApi('ping', {});
    showSpinner(false);
    if (data.ok) {
      showToast(`ping OK: ${data.result.user} (${data.result.label})`, 'success');
    } else {
      showToast('ping エラー: ' + data.error, 'error');
    }
  } catch (err) {
    showSpinner(false);
    showToast('ping 失敗: ' + err.message, 'error');
  }
}

// ── GAS Web App API 呼び出し ──────────────────────────────────────────
async function callApi(action, payload) {
  if (!idToken) {
    if (typeof google !== 'undefined' && google.accounts) google.accounts.id.prompt();
    throw new Error('未ログイン');
  }
  const res = await fetch(WEBAPP_URL, {
    method:  'POST',
    // text/plain: CORS preflight を回避（GAS は OPTIONS に対応しないため）
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body:    JSON.stringify({ action, idToken, ...payload })
  });
  const data = await res.json();
  // トークン期限切れ等 → サインイン画面へ誘導
  if (!data.ok && /ログイン|トークン|aud|許可/.test(data.error || '')) {
    idToken     = null;
    userAccount = null;
    userLabel   = null;
    if (typeof google !== 'undefined' && google.accounts) google.accounts.id.prompt();
    renderApp();
  }
  return data;
}

// ── UI ヘルパー ───────────────────────────────────────────────────────
function showSpinner(visible) {
  document.getElementById('spinner-overlay').classList.toggle('hidden', !visible);
}

let _toastTimer;
function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (type ? ' ' + type : '');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { el.className = ''; }, 4000);
}
</script>
